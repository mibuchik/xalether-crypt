name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build executable (Linux)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        chmod +x build.sh
        ./build.sh
        mv dist/XaletherCrypt dist/XaletherCrypt-Linux

    - name: Build executable (Windows)
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: |
        build_windows.bat
        move dist\XaletherCrypt.exe dist\XaletherCrypt-Windows.exe

- name: Build executable (macOS)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        chmod +x build_macos.sh
        ./build_macos.sh
        mv dist/XaletherCrypt dist/XaletherCrypt-macOS

    - name: Verify build output (Linux/macOS)
      if: matrix.os != 'windows-latest'
      shell: bash
      run: |
        echo "Build output structure:"
        find . -name "XaletherCrypt*" -type f 2>/dev/null || true
        ls -la dist/ 2>/dev/null || true

    - name: Verify build output (Windows)
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: |
        echo Build output structure:
        dir /s /b *XaletherCrypt* 2>nul || echo No files found
        if exist dist\ dir dist\ || echo dist directory not found
  
  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Verify build output
      run: |
        echo "Build output structure:"
        find . -name "XaletherCrypt*" -type f 2>/dev/null || true
        ls -la dist/ 2>/dev/null || true
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-executable
        path: dist/
    
    - name: Display structure and find files
      shell: bash
      run: |
        echo "Artifacts structure:"
        find artifacts -type f 2>/dev/null || true
        echo ""
        echo "Looking for XaletherCrypt files:"
        find artifacts -name "*XaletherCrypt*" -type f 2>/dev/null || true
    
    - name: Read version
      id: version
      run: echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: Xalether Crypt v${{ steps.version.outputs.VERSION }}
        draft: false
        prerelease: false
        files: |
          artifacts/**/*XaletherCrypt-Linux*
          artifacts/**/*XaletherCrypt-Windows*
          artifacts/**/*XaletherCrypt-macOS*